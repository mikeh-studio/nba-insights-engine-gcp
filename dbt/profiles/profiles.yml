nba_warehouse:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: "{{ env_var('BQ_PROJECT', env_var('GCP_PROJECT_ID', 'local-project')) }}"
      dataset: "{{ env_var('BQ_DATASET_GOLD', env_var('BQ_DATASET', 'nba_gold')) }}"
      location: "{{ env_var('BQ_LOCATION', 'US') }}"
      threads: 4
      timeout_seconds: 300
      priority: interactive

    redshift:
      type: redshift
      host: "{{ env_var('REDSHIFT_HOST', 'localhost') }}"
      port: "{{ env_var('REDSHIFT_PORT', '5439') | int }}"
      user: "{{ env_var('REDSHIFT_USER', 'admin') }}"
      password: "{{ env_var('REDSHIFT_PASSWORD', '') }}"
      dbname: "{{ env_var('REDSHIFT_DB', 'nba_analytics') }}"
      schema: "{{ env_var('REDSHIFT_SCHEMA_GOLD', 'nba_gold') }}"
      threads: 4
