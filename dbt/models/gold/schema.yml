version: 2

sources:
  - name: gold_runtime
    database: "{{ env_var('BQ_PROJECT', env_var('GCP_PROJECT_ID', 'local-project')) }}"
    schema: "{{ env_var('BQ_DATASET_GOLD', env_var('BQ_DATASET', 'nba_gold')) }}"
    tables:
      - name: analysis_snapshots
        columns:
          - name: snapshot_id
            tests: [not_null]
          - name: snapshot_date
            tests: [not_null]
          - name: season
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['2025-26']
          - name: source_run_id
            tests: [not_null]

models:
  - name: fct_player_game_stats
    columns:
      - name: game_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_game')
                field: game_id
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: &nba_team_abbrs ['ATL', 'BOS', 'BKN', 'CHA', 'CHI', 'CLE', 'DAL', 'DEN', 'DET', 'GSW', 'HOU', 'IND', 'LAC', 'LAL', 'MEM', 'MIA', 'MIL', 'MIN', 'NOP', 'NYK', 'OKC', 'ORL', 'PHI', 'PHX', 'POR', 'SAC', 'SAS', 'TOR', 'UTA', 'WAS']
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: opponent_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: game_date
        tests: [not_null]
      - name: matchup
        tests: [not_null]
      - name: wl
        tests:
          - accepted_values:
              arguments:
                values: ['W', 'L']
      - name: fantasy_points_simple
        tests: [not_null]
  - name: dim_player
    columns:
      - name: player_id
        tests: [not_null, unique]
      - name: latest_team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: latest_season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
  - name: dim_team
    columns:
      - name: team_abbr
        tests:
          - not_null
          - unique
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
      - name: team_id
        tests: [not_null, unique]
      - name: team_city_name
        tests: [not_null]
      - name: team_nickname
        tests: [not_null]
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
  - name: dim_game
    columns:
      - name: game_id
        tests: [not_null, unique]
      - name: game_date
        tests: [not_null]
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: home_team_abbr
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: away_team_abbr
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: home_team_pts
        tests: [not_null]
      - name: away_team_pts
        tests: [not_null]
  - name: fct_team_game_scores
    columns:
      - name: game_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_game')
                field: game_id
      - name: team_id
        tests: [not_null]
      - name: team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: opponent_team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: team_pts
        tests: [not_null]
  - name: fct_player_scoring_contribution
    columns:
      - name: game_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_game')
                field: game_id
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: player_points_share_of_team
        tests: [not_null]
  - name: player_trends
    columns:
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: stat
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['PTS', 'REB', 'AST', 'STL', 'BLK', 'TOV', 'MIN', 'FANTASY_POINTS_SIMPLE']
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
  - name: daily_leaderboard
    columns:
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: game_date
        tests: [not_null]
      - name: pts_leader
        tests: [not_null]
  - name: player_recent_form
    columns:
      - name: player_id
        tests:
          - not_null
      - name: team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
  - name: player_category_profile
    columns:
      - name: player_id
        tests:
          - not_null
      - name: latest_team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: category_coverage_status
        tests:
          - accepted_values:
              arguments:
                values: ['partial_until_fg_ft_available']
  - name: player_opportunity_outlook
    columns:
      - name: player_id
        tests:
          - not_null
          - unique
      - name: team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
  - name: player_similarity_feature_input
    columns:
      - name: as_of_date
        tests: [not_null]
      - name: player_id
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: team_abbr
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: *nba_team_abbrs
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: sample_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ready', 'limited_sample', 'insufficient_sample']
  - name: player_fantasy_rankings
    columns:
      - name: player_id
        tests:
          - not_null
          - unique
      - name: recommendation_tier
        tests:
          - accepted_values:
              arguments:
                values: ['strong_add', 'hold_or_stream', 'watchlist']
  - name: fantasy_insights
    columns:
      - name: insight_id
        tests: [not_null, unique]
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
              config:
                enabled: false
      - name: insight_type
        tests:
          - accepted_values:
              arguments:
                values: ['hot_streak', 'minutes_spike', 'sell_high']
  - name: workbench_compare
    columns:
      - name: as_of_date
        tests: [not_null]
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: window_key
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['last_3', 'last_5', 'last_7', 'prior_5', 'last_10']
  - name: workbench_dashboard
    columns:
      - name: as_of_date
        tests: [not_null]
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: overall_rank
        tests: [not_null]
      - name: trend_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['rising', 'falling', 'flat', 'insufficient_sample']
      - name: reason_primary_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
      - name: reason_secondary_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
      - name: reason_context_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
  - name: workbench_home_dashboard
    columns:
      - name: as_of_date
        tests: [not_null]
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
              config:
                enabled: false
      - name: overall_rank
        tests: [not_null]
      - name: trend_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['rising', 'falling', 'flat', 'insufficient_sample']
      - name: reason_primary_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
      - name: reason_secondary_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
      - name: reason_context_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
  - name: workbench_player_detail
    columns:
      - name: as_of_date
        tests: [not_null]
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: overall_rank
        tests: [not_null]
      - name: trend_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['rising', 'falling', 'flat', 'insufficient_sample']
      - name: reason_primary_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
      - name: reason_secondary_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
      - name: reason_context_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
