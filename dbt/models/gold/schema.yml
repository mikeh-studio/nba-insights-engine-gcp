version: 2

sources:
  - name: gold_runtime
    database: "{{ env_var('BQ_PROJECT', env_var('GCP_PROJECT_ID', 'local-project')) }}"
    schema: "{{ env_var('BQ_DATASET_GOLD', env_var('BQ_DATASET', 'nba_gold')) }}"
    tables:
      - name: analysis_snapshots
        columns:
          - name: snapshot_id
            tests: [not_null]
          - name: snapshot_date
            tests: [not_null]
          - name: season
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['2025-26']
          - name: source_run_id
            tests: [not_null]

models:
  - name: fct_player_game_stats
    columns:
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: team_abbr
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: opponent_abbr
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: game_date
        tests: [not_null]
      - name: matchup
        tests: [not_null]
      - name: wl
        tests:
          - accepted_values:
              arguments:
                values: ['W', 'L']
      - name: fantasy_points_simple
        tests: [not_null]
  - name: dim_player
    columns:
      - name: player_id
        tests: [not_null, unique]
      - name: latest_season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
  - name: dim_team
    columns:
      - name: team_abbr
        tests: [not_null, unique]
      - name: latest_season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
  - name: player_trends
    columns:
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: stat
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['PTS', 'REB', 'AST', 'STL', 'BLK', 'TOV', 'MIN', 'FANTASY_POINTS_SIMPLE']
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
  - name: daily_leaderboard
    columns:
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: game_date
        tests: [not_null]
      - name: pts_leader
        tests: [not_null]
  - name: analysis_snapshot_latest
    columns:
      - name: snapshot_id
        tests: [not_null]
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
  - name: player_recent_form
    columns:
      - name: player_id
        tests:
          - not_null
      - name: team_abbr
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
  - name: player_category_profile
    columns:
      - name: player_id
        tests:
          - not_null
      - name: category_coverage_status
        tests:
          - accepted_values:
              arguments:
                values: ['partial_until_fg_ft_available']
  - name: player_opportunity_outlook
    columns:
      - name: player_id
        tests:
          - not_null
          - unique
      - name: team_abbr
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_abbr
  - name: player_fantasy_rankings
    columns:
      - name: player_id
        tests:
          - not_null
          - unique
      - name: recommendation_tier
        tests:
          - accepted_values:
              arguments:
                values: ['strong_add', 'hold_or_stream', 'watchlist']
  - name: fantasy_insights
    columns:
      - name: insight_id
        tests: [not_null, unique]
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: insight_type
        tests:
          - accepted_values:
              arguments:
                values: ['hot_streak', 'minutes_spike', 'sell_high']
  - name: fantasy_recommendation_backtest
    columns:
      - name: insight_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fantasy_insights')
                field: insight_id
      - name: backtest_status
        tests:
          - accepted_values:
              arguments:
                values: ['pending', 'hit', 'miss']
  - name: workbench_compare
    columns:
      - name: as_of_date
        tests: [not_null]
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: window_key
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['last_5', 'prior_5', 'last_10']
  - name: workbench_dashboard
    columns:
      - name: as_of_date
        tests: [not_null]
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: overall_rank
        tests: [not_null]
      - name: trend_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['rising', 'falling', 'flat', 'insufficient_sample']
      - name: reason_primary_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
      - name: reason_secondary_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
      - name: reason_context_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
  - name: workbench_player_detail
    columns:
      - name: as_of_date
        tests: [not_null]
      - name: player_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: overall_rank
        tests: [not_null]
      - name: trend_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['rising', 'falling', 'flat', 'insufficient_sample']
      - name: reason_primary_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
      - name: reason_secondary_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
      - name: reason_context_code
        tests:
          - accepted_values:
              arguments:
                values: ['recent_fp_delta', 'minutes_delta', 'games_next_7d', 'back_to_back_count', 'trend_stat_delta', 'category_edge']
