version: 2

sources:
  - name: bronze
    database: "{{ env_var('BQ_PROJECT', env_var('GCP_PROJECT_ID', 'local-project')) }}"
    schema: "{{ env_var('BQ_DATASET_BRONZE', env_var('BQ_DATASET', 'nba_bronze')) }}"
    loader: airflow
    config:
      loaded_at_field: ingested_at_utc
      freshness:
        warn_after: {count: 36, period: hour}
        error_after: {count: 72, period: hour}
    tables:
      - name: raw_game_logs
        columns:
          - name: player_id
            tests: [not_null]
          - name: game_date
            tests: [not_null]
          - name: matchup
            tests: [not_null]
          - name: season
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['2025-26']
          - name: wl
            tests:
              - accepted_values:
                  arguments:
                    values: ['W', 'L']
      - name: raw_schedule
        columns:
          - name: schedule_date
            tests: [not_null]
          - name: team_abbr
            tests: [not_null]
          - name: opponent_abbr
            tests: [not_null]
