version: 2

models:
  - name: stg_game_logs_clean
    columns:
      - name: game_id
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: game_date
        tests: [not_null]
      - name: matchup
        tests: [not_null]
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: wl
        tests:
          - accepted_values:
              arguments:
                values: ['W', 'L']
  - name: int_player_game_enriched
    columns:
      - name: game_id
        tests: [not_null]
      - name: season
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['2025-26']
      - name: team_abbr
        tests: [not_null]
      - name: opponent_abbr
        tests: [not_null]
  - name: stg_schedule_clean
    columns:
      - name: schedule_date
        tests: [not_null]
      - name: team_abbr
        tests: [not_null]
      - name: opponent_abbr
        tests: [not_null]
      - name: game_status
        tests:
          - accepted_values:
              arguments:
                values: ['scheduled', 'final', 'postponed']
  - name: stg_game_line_scores_clean
    columns:
      - name: game_id
        tests: [not_null]
      - name: team_id
        tests: [not_null]
      - name: team_abbr
        tests: [not_null]
      - name: pts
        tests: [not_null]
  - name: stg_player_reference_clean
    columns:
      - name: player_id
        tests: [not_null, unique]
      - name: player_name
        tests: [not_null]
